<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA redirect — route any 404 back to the correct sub-app root
    var path = window.location.pathname;
    var dest;
    if (path.indexOf('/member-cwfassessments') !== -1) {
      dest = '/gc-cwf-activity/member-cwfassessments/';
    } else if (path.indexOf('/member-assessmentscampaign') !== -1) {
      dest = '/gc-cwf-activity/member-assessmentscampaign/';
    } else {
      dest = '/gc-cwf-activity/';
    }
    window.location.replace(dest);
  </script>
</head>
<body></body>
</html>
