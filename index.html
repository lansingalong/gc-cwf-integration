<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuidingCare × Wellframe — North Star Prototypes</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #1378A3;
    --teal-light: #E3F2FA;
    --teal-dark: #0C5275;
    --border: #DDDDDD;
    --font: 'Open Sans', Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: #F0F4F7; min-height: 100vh; display: flex; flex-direction: column; }

  .nav { background: #fff; border-bottom: 1px solid var(--border); padding: 0 32px; height: 52px; display: flex; align-items: center; gap: 14px; }
  .nav-logo { height: 30px; }
  .nav-divider { width: 1px; height: 24px; background: var(--border); }
  .nav-title { font-size: 13px; color: #555; }

  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 860px; margin: 60px auto; padding: 0 32px; }

  .card { background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.18s, transform 0.18s; cursor: pointer; text-decoration: none; }
  .card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.13); transform: translateY(-3px); }

  .card-accent { height: 5px; }
  .card-accent-a { background: linear-gradient(90deg, #1378A3, #1D9E75); }
  .card-accent-b { background: linear-gradient(90deg, #5B4FCF, #1378A3); }
  .card-accent-c { background: linear-gradient(90deg, #E07820, #D94F2C); }

  .card-body { padding: 28px 24px 24px; flex: 1; display: flex; flex-direction: column; align-items: flex-start; gap: 16px; }
  .card-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #999; }
  .card-title { font-size: 18px; font-weight: 800; color: #1a1a1a; line-height: 1.3; }

  .card-cta { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700; color: var(--teal); margin-top: auto; }
  .card-cta .material-icons { font-size: 16px; }
</style>
</head>
<body>

<nav class="nav">
  <img class="nav-logo" src="assets/_Custom/Wordmark.png" alt="HealthEdge" />
  <div class="nav-divider"></div>
  <span class="nav-title">GuidingCare &times; Wellframe &mdash; North Star Integration Concepts</span>
</nav>

<div class="cards">

  <a class="card" href="option-a.html">
    <div class="card-accent card-accent-a"></div>
    <div class="card-body">
      <div class="card-label">Concept A</div>
      <div class="card-title">Wellframe Digital Hub</div>
      <span class="card-cta"><span class="material-icons">open_in_new</span>View prototype</span>
    </div>
  </a>

  <a class="card" href="option-b.html">
    <div class="card-accent card-accent-b"></div>
    <div class="card-body">
      <div class="card-label">Concept B</div>
      <div class="card-title">Persistent Split View</div>
      <span class="card-cta"><span class="material-icons">open_in_new</span>View prototype</span>
    </div>
  </a>

  <a class="card" href="option-c.html">
    <div class="card-accent card-accent-c"></div>
    <div class="card-body">
      <div class="card-label">Concept C</div>
      <div class="card-title">Lift &amp; Shift Dashboard</div>
      <span class="card-cta"><span class="material-icons">open_in_new</span>View prototype</span>
    </div>
  </a>

</div>

</body>
</html>
