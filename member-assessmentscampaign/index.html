<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/gc-cwf-activity/member-assessmentscampaign/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <script type="module" crossorigin src="/gc-cwf-activity/member-assessmentscampaign/assets/index-BU5pyREn.js"></script>
    <link rel="stylesheet" crossorigin href="/gc-cwf-activity/member-assessmentscampaign/assets/index-BYSRnl4G.css">
  </head>
  <body>
    <div id="root"><p style="padding:20px;color:#333;font-family:sans-serif;">Loading app… if this message stays, check browser console for errors.</p></div>
    <script>
      window.addEventListener('error', function(e) {
        var d = document.getElementById('root');
        if (d && !d.hasChildNodes()) {
          d.innerHTML = '<div style="padding:20px;font-family:monospace;color:red;font-size:12px;background:#fff2f2;border:1px solid red;margin:20px;border-radius:4px"><strong>JS Error:</strong><br>' + (e.message||'unknown') + '<br>' + (e.filename||'') + ':' + (e.lineno||'') + '</div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var d = document.getElementById('root');
        if (d && !d.hasChildNodes()) {
          d.innerHTML = '<div style="padding:20px;font-family:monospace;color:red;font-size:12px;background:#fff2f2;border:1px solid red;margin:20px;border-radius:4px"><strong>Unhandled Promise:</strong><br>' + String(e.reason) + '</div>';
        }
      });
    </script>
  </body>
</html>
